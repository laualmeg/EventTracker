<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro al Evento</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        h1 {
            color: #1f2937;
            margin-bottom: 10px;
            font-size: 24px;
            text-align: center;
        }

        p {
            color: #4b5563;
            margin-bottom: 25px;
            font-size: 14px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .success {
            background-color: #def7ec;
            color: #03543f;
            display: block;
        }

        .error {
            background-color: #fde8e8;
            color: #9b1c1c;
            display: block;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Registro al Evento</h1>

        <p>
            Completa tus datos para asegurar tu entrada
            y recibir tu confirmación por correo.
        </p>

        <form id="registrationForm">

            <div class="form-group">
                <label for="nombre">Nombre Completo</label>

                <input
                    type="text"
                    id="nombre"
                    required
                    placeholder="Ej. Juan Pérez"
                >
            </div>

            <div class="form-group">
                <label for="correo">Correo Electrónico</label>

                <input
                    type="email"
                    id="correo"
                    required
                    placeholder="ejemplo@correo.com"
                >
            </div>

            <button type="submit" id="btnEnviar">
                Confirmar Asistencia
            </button>

        </form>

        <div id="statusMessage" class="message"></div>
    </div>

    <script>
        document
            .getElementById('registrationForm')
            .addEventListener('submit', async (e) => {

            e.preventDefault();

            const btn = document.getElementById('btnEnviar');
            const msg = document.getElementById('statusMessage');

            // const nombre = document.getelementbyid('nombre').value;
            // const correo = document.getelementbyid('correo').value;

            btn.disabled = true;
            btn.innerText = "Procesando...";

            msg.className = "message";
            msg.innerText = "";

            // try {

            //     const response = await fetch('/api/registrarAsistencia', {
            //         method: 'POST',
            //         headers: {
            //             'Content-Type': 'application/json'
            //         },
            //         body: JSON.stringify({ nombre, correo })
            //     });

            //     if (response.ok) {

            //         msg.innerText =
            //             "¡Registro exitoso! Revisa tu correo.";

            //         msg.classList.add('success');

            //         document
            //             .getElementById('registrationForm')
            //             .reset();

            //     } else {
            //         throw new Error();
            //     }

            // } catch (error) {

            //     msg.innerText =
            //         "Hubo un error al registrarte.";

            //     msg.classList.add('error');

            // } finally {

            //     btn.disabled = false;
            //     btn.innerText = "Confirmar Asistencia";
            // }
			// Simulación de registro correcto
			setTimeout(() => {

            msg.innerText =
                "¡Registro exitoso!";

            msg.classList.add('success');

            document
                .getElementById('registrationForm')
                .reset();

            btn.disabled = false;

            btn.innerText =
                "Confirmar Asistencia";

        }, 1000);
        });
    </script>

</body>
</html>
